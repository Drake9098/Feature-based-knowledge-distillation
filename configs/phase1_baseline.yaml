# Fase 1 — baseline student (solo cross-entropy, senza distillazione)
experiment:
  name: phase1_baseline
  seed: 42
  device: cuda # usa "cpu" se necessario

data:
  # Allineato a scripts/download_offline_assets.py → copia la cartella `dataset/` sul cluster
  root: ./dataset
  batch_size: 128
  num_workers: 4
  download: false
  pin_memory: true
  drop_last: false
  # TODO: split train/val opzionale (random_split) in build_cifar100_loaders se serve early stopping

training:
  epochs: 200
  learning_rate: 0.1
  momentum: 0.9
  weight_decay: 5.0e-4
  scheduler:
    name: multistep
    milestones: [60, 120, 160]
    gamma: 0.2

model:
  teacher_name: resnet50
  student_name: resnet18
  num_classes: 100
  pretrained_teacher: true
  teacher_weights_path: ./weights/resnet50_imagenet1k_v1.pth

checkpoint:
  dir: ./experiments/checkpoints
  # TODO: naming run (timestamp, hyperparam) se vuoi più esperimenti paralleli

metrics:
  latency_num_batches: 50
  latency_warmup_batches: 5
